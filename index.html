<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spedimar – Link Hub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #f5f7fa;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: linear-gradient(160deg, #e8f0fe 0%, #f5f7fa 50%, #ddeeff 100%);
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo-wrap {
    width: auto;
    height: auto;
    padding: 16px 24px;
    margin: 0 auto 18px;
    background: white;
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(13,71,161,0.15), 0 1px 4px rgba(0,0,0,0.08);
  }

  .logo-wrap img { width: 80px; height: 80px; object-fit: contain; }

  .brand-name {
    font-size: 1.7rem;
    font-weight: 900;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #0d47a1;
  }

  .brand-tagline {
    margin-top: 5px;
    font-size: 0.78rem;
    color: #7a9abf;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* Divider */
  .divider {
    height: 2px;
    background: linear-gradient(90deg, transparent, #1565c0, transparent);
    margin: 0 auto 32px;
    max-width: 200px;
    border-radius: 2px;
    opacity: 0.3;
  }

  /* Cards */
  .links {
    display: flex;
    flex-direction: column;
    gap: 13px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 15px 20px;
    border-radius: 16px;
    text-decoration: none;
    background: white;
    border: 1.5px solid transparent;
    box-shadow: 0 2px 12px rgba(13,71,161,0.07);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
  }

  .link-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(13,71,161,0.15);
  }

  .card-web:hover   { border-color: #1565c0; }
  .card-fb:hover    { border-color: #1877f2; }
  .card-ig:hover    { border-color: #e1306c; }
  .card-li:hover    { border-color: #0a66c2; }

  .icon-wrap {
    width: 48px;
    height: 48px;
    border-radius: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .icon-web { background: linear-gradient(135deg, #1976d2, #0d47a1); }
  .icon-fb  { background: #1877f2; }
  .icon-ig  { background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af, #515bd4); }
  .icon-li  { background: #0a66c2; }

  .icon-wrap svg { width: 24px; height: 24px; fill: white; }

  .card-text { flex: 1; }
  .card-label { font-size: 1rem; font-weight: 700; color: #1a2a4a; display: block; }
  .card-sub   { font-size: 0.77rem; color: #a0b0c8; margin-top: 2px; display: block; }

  .arrow {
    color: #c5d5e8;
    font-size: 1.2rem;
    transition: color 0.18s, transform 0.18s;
  }
  .link-card:hover .arrow { color: #1565c0; transform: translateX(4px); }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 0.71rem;
    color: #b0c0d8;
    letter-spacing: 0.06em;
  }
</style>
<script>
  // Converte l'immagine incollata dall'utente in base64 e la mostra
  window.addEventListener('DOMContentLoaded', () => {
    // Logo MP Spedimar – caricato via FileReader da file locale se disponibile
    // Fallback: SVG inline fedele al logo originale
    const img = document.getElementById('logo-img');
    // SVG fedele al logo MP (M blu scuro + P cyan con barra verticale M interna)
    const svgLogo = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110">
      <rect width="110" height="110" rx="55" fill="white"/>
      <!-- Barra sinistra M -->
      <rect x="10" y="18" width="11" height="74" fill="#1a237e"/>
      <!-- Barra destra M -->
      <rect x="44" y="18" width="11" height="74" fill="#1a237e"/>
      <!-- Diagonale sinistra M -->
      <polygon points="10,18 21,18 38,52 27,52" fill="#1a237e"/>
      <!-- Diagonale destra M -->
      <polygon points="55,18 44,18 27,52 38,52" fill="#1a237e"/>
      <!-- Barra verticale interna M (cyan) -->
      <rect x="26" y="18" width="13" height="74" fill="#29b6d8"/>
      <!-- Corpo P (semicerchio) -->
      <path d="M58,18 Q100,18 100,45 Q100,72 58,72 L58,18 Z" fill="none" stroke="#1a237e" stroke-width="13"/>
      <!-- Gambo P -->
      <rect x="56" y="18" width="12" height="74" fill="none"/>
    </svg>`;
    const blob = new Blob([svgLogo], {type:'image/svg+xml'});
    img.src = URL.createObjectURL(blob);
  });
</script>

    <!-- Instagram -->
    <a class="link-card card-ig" href="https://www.instagram.com/spedimarsagl/" target="_blank" rel="noopener">

      <div class="card-text">

  </div>

  <div class="footer">© 2025 Spedimar SAGL · Chiasso, Svizzera</div>

</body>
